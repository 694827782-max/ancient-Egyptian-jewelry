<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古代埃及首饰库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 40px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stats {
            color: #7f8c8d;
            font-size: 1.1em;
        }
        
        .search-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .search-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        input, select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #2980b9;
        }
        
        button.secondary {
            background: #95a5a6;
        }
        
        button.secondary:hover {
            background: #7f8c8d;
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .card-image {
            width: 100%;
            height: 200px;
            background: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #95a5a6;
            font-size: 0.9em;
            overflow: hidden;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-content {
            padding: 15px;
        }
        
        .card-title {
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .card-info {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        
        .card-meta {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .tag {
            display: inline-block;
            background: #ecf0f1;
            color: #2c3e50;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #ecf0f1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: #2c3e50;
            margin: 0;
        }
        
        .close {
            font-size: 28px;
            font-weight: bold;
            color: #95a5a6;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close:hover {
            color: #2c3e50;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .image-gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .modal-image {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 4px;
            display: none;
        }
        
        .modal-image.active {
            display: block;
        }
        
        .detail-item {
            margin-bottom: 15px;
        }
        
        .detail-label {
            color: #7f8c8d;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .detail-value {
            color: #2c3e50;
            font-size: 1em;
            line-height: 1.6;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
        }
        
        @media (max-width: 768px) {
            .search-controls {
                grid-template-columns: 1fr;
            }
            
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏺 古代埃及首饰库</h1>
            <div class="stats">
                共收录 <span id="total-count">0</span> 件文物
            </div>
        </header>
        
        <div class="search-section">
            <div class="search-controls">
                <input type="text" id="search-name" placeholder="搜索文物名称...">
                <select id="filter-dynasty">
                    <option value="">所有朝代</option>
                </select>
                <select id="filter-material">
                    <option value="">所有材质</option>
                </select>
                <select id="filter-source">
                    <option value="">所有来源</option>
                </select>
            </div>
            <div class="button-group">
                <button onclick="searchJewelry()">搜索</button>
                <button class="secondary" onclick="resetSearch()">重置</button>
            </div>
        </div>
        
        <div id="gallery" class="gallery">
            <div class="no-data">加载中...</div>
        </div>
    </div>
    
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="image-gallery" id="image-gallery"></div>
                <img id="modal-main-image" class="modal-image active" alt="">
                <div id="modal-details"></div>
            </div>
        </div>
    </div>
    
    <script>
        let allJewelry = [];
        let filteredJewelry = [];
        
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('无法加载数据');
                allJewelry = await response.json();
                filteredJewelry = allJewelry;
                
                populateFilters();
                renderGallery();
                updateStats();
            } catch (error) {
                document.getElementById('gallery').innerHTML = 
                    '<div class="no-data">❌ 无法加载数据。请确保 data.json 文件已上传。</div>';
                console.error('加载错误:', error);
            }
        }
        
        function populateFilters() {
            const dynasties = new Set();
            const materials = new Set();
            const sources = new Set();
            
            allJewelry.forEach(item => {
                if (item.dynasty) dynasties.add(item.dynasty);
                if (item.material) materials.add(item.material);
                if (item.source) sources.add(item.source);
            });
            
            const dynastySelect = document.getElementById('filter-dynasty');
            dynasties.forEach(d => {
                const option = document.createElement('option');
                option.value = d;
                option.textContent = d;
                dynastySelect.appendChild(option);
            });
            
            const materialSelect = document.getElementById('filter-material');
            materials.forEach(m => {
                const option = document.createElement('option');
                option.value = m;
                option.textContent = m;
                materialSelect.appendChild(option);
            });
            
            const sourceSelect = document.getElementById('filter-source');
            sources.forEach(s => {
                const option = document.createElement('option');
                option.value = s;
                option.textContent = s;
                sourceSelect.appendChild(option);
            });
        }
        
        function searchJewelry() {
            const name = document.getElementById('search-name').value.toLowerCase();
            const dynasty = document.getElementById('filter-dynasty').value;
            const material = document.getElementById('filter-material').value;
            const source = document.getElementById('filter-source').value;
            
            filteredJewelry = allJewelry.filter(item => {
                return (name === '' || item.name.toLowerCase().includes(name)) &&
                       (dynasty === '' || item.dynasty === dynasty) &&
                       (material === '' || item.material === material) &&
                       (source === '' || item.source === source);
            });
            
            renderGallery();
        }
        
        function resetSearch() {
            document.getElementById('search-name').value = '';
            document.getElementById('filter-dynasty').value = '';
            document.getElementById('filter-material').value = '';
            document.getElementById('filter-source').value = '';
            filteredJewelry = allJewelry;
            renderGallery();
        }
        
        function renderGallery() {
            const gallery = document.getElementById('gallery');
            
            if (filteredJewelry.length === 0) {
                gallery.innerHTML = '<div class="no-data">未找到匹配的文物</div>';
                return;
            }
            
            gallery.innerHTML = filteredJewelry.map((item, index) => `
                <div class="card" onclick="openModal(${index})">
                    <div class="card-image">
                        ${item.images && item.images.length > 0 ? 
                            `<img src="${item.images[0]}" alt="${item.name}" onerror="this.style.display='none'">` : 
                            '<span>无图片</span>'}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${item.name}</div>
                        <div class="card-info">📅 ${item.dynasty || '未知'}</div>
                        <div class="card-info">💎 ${item.material || '未知'}</div>
                        <div class="card-meta">
                            ${item.craft ? `<span class="tag">${item.craft}</span>` : ''}
                            ${item.source ? `<span class="tag">${item.source}</span>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function openModal(index) {
            const item = filteredJewelry[index];
            document.getElementById('modal-title').textContent = item.name;
            
            // 图片库
            const imageGallery = document.getElementById('image-gallery');
            imageGallery.innerHTML = '';
            if (item.images && item.images.length > 0) {
                item.images.forEach((img, i) => {
                    const imgEl = document.createElement('img');
                    imgEl.src = img;
                    imgEl.alt = item.name;
                    imgEl.onerror = function() { this.style.display = 'none'; };
                    imgEl.onclick = (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.modal-image').forEach(m => m.classList.remove('active'));
                        document.getElementById('modal-main-image').src = img;
                        document.getElementById('modal-main-image').classList.add('active');
                    };
                    imageGallery.appendChild(imgEl);
                });
                document.getElementById('modal-main-image').src = item.images[0];
            }
            
            // 详细信息
            let details = `
                <div class="detail-item">
                    <div class="detail-label">朝代</div>
                    <div class="detail-value">${item.dynasty || '未知'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">材质</div>
                    <div class="detail-value">${item.material || '未知'}</div>
                </div>
            `;
            
            if (item.craft) {
                details += `
                    <div class="detail-item">
                        <div class="detail-label">工艺</div>
                        <div class="detail-value">${item.craft}</div>
                    </div>
                `;
            }
            
            if (item.source) {
                details += `
                    <div class="detail-item">
                        <div class="detail-label">来源</div>
                        <div class="detail-value">${item.source}</div>
                    </div>
                `;
            }
            
            if (item.description) {
                details += `
                    <div class="detail-item">
                        <div class="detail-label">描述</div>
                        <div class="detail-value">${item.description}</div>
                    </div>
                `;
            }
            
            document.getElementById('modal-details').innerHTML = details;
            document.getElementById('detailModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }
        
        function updateStats() {
            document.getElementById('total-count').textContent = allJewelry.length;
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
        
        // 页面加载时获取数据
        loadData();
    </script>
</body>
</html>
